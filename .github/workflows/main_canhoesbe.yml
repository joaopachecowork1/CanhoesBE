# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.NET Core app to Azure Web App - CanhoesBE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Canhoes.API/**"
      - "Canhoes.BL/**"
      - "Canhoes.Database/**"
      - "Canhoes.Database.Sql/**"
      - "Canhoes.Domain/**"
      - "Canhoes.Infrastructure/**"
      - "Canhoes.Tests/**"
      - "Canhoes.slnx"
      - ".github/workflows/main_canhoesbe.yml"

env:
  PROJECT_PATH: ./Canhoes.API/Canhoes.Api.csproj
  PUBLISH_PATH: ${{ github.workspace }}/published-api
  PACKAGE_PATH: ${{ github.workspace }}/canhoes-api.zip

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output "${{ env.PUBLISH_PATH }}"

      - name: Create deployment package
        shell: pwsh
        run: |
          if (Test-Path "${{ env.PACKAGE_PATH }}") {
            Remove-Item "${{ env.PACKAGE_PATH }}" -Force
          }

          # Zip deploy is more deterministic for App Service than uploading a
          # loose folder tree, which helps avoid stale binaries on the server.
          Compress-Archive -Path "${{ env.PUBLISH_PATH }}\\*" -DestinationPath "${{ env.PACKAGE_PATH }}"

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: canhoes-api
          path: ${{ env.PACKAGE_PATH }}

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: canhoes-api
          path: ${{ github.workspace }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E6A8D0CC8FAD45D2B77451AEEB03B668 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D064AF3FD9BD40D3B318802FC56234B2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_10748EC10DDB4FB899480BB16C350E00 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "CanhoesBE"
          slot-name: "Production"
          package: ${{ env.PACKAGE_PATH }}
